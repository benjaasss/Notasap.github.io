<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro Técnico | Liquid Glass</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
    
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      /* Fondo establecido con la imagen proporcionada */
      background-image: url('https://i.pinimg.com/736x/23/e3/d0/23e3d09caa9764998bb7fc3ba4a34e8e.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      min-height: 100vh;
      color: white;
    }
    
    /* Efecto Liquid Glass mejorado para el nuevo fondo */
    .glass-morphism {
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
    }
  </style>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
    import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

    const firebaseConfig = {
      apiKey: "AIzaSyBPxjkm-GAqIJFt80rP2igwz-T6RIt1e40",
      authDomain: "mis-notas-web-756e0.firebaseapp.com",
      projectId: "mis-notas-web-756e0",
      storageBucket: "mis-notas-web-756e0.appspot.com",
      messagingSenderId: "281781573347",
      appId: "1:281781573347:web:bc5eaee5565bd6dee457d6"
    };

    initializeApp(firebaseConfig);
    const db = getFirestore();
    signInAnonymously(getAuth());

    const form = document.getElementById('note-form');
    const postsContainer = document.getElementById('posts-container');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(form);
      const data = Object.fromEntries(formData.entries());
      let content = [
        data.procesador && `CPU: ${data.procesador}`,
        data.ram && `RAM: ${data.ram}`,
        data.almacenamiento && `HDD/SSD: ${data.almacenamiento}`,
        data.grafica && `GPU: ${data.grafica}`,
        data.nota && `Notas: ${data.nota}`
      ].filter(Boolean).join(' • ');

      await addDoc(collection(db, 'posts'), {
        title: data.title,
        content: content || "Sin especificaciones.",
        createdAt: new Date().toISOString()
      });
      form.reset();
    });

    onSnapshot(query(collection(db, 'posts'), orderBy('createdAt', 'desc')), (snapshot) => {
      postsContainer.innerHTML = '';
      snapshot.forEach((doc) => {
        const post = doc.data();
        const date = new Date(post.createdAt).toLocaleDateString('es-ES', { year: 'numeric', month: 'long', day: 'numeric' });
        postsContainer.innerHTML += `
          <div class="glass-morphism p-8 rounded-[2rem] hover:scale-[1.02] transition-all duration-300">
            <h2 class="font-bold text-lg text-white">${post.title}</h2>
            <p class="mt-3 text-sm text-slate-200 font-medium">${post.content}</p>
            <div class="mt-4 text-xs text-slate-400 font-bold uppercase tracking-widest">${date}</div>
          </div>
        `;
      });
    });
  </script>
</head>
<body class="p-6 md:p-12">
  <main class="max-w-xl mx-auto">
    <header class="text-center mb-16">
      <div class="inline-block p-2 glass-morphism rounded-3xl mb-8">
        <img src="https://www.liceolaportada.cl/wp-content/uploads/Tiburon-a22.png" alt="Logo Liceo" class="w-16 h-16 object-contain">
      </div>
      <h1 class="text-5xl font-extrabold tracking-tighter text-white mb-3">Registro Técnico</h1>
    </header>

    <form id="note-form" class="glass-morphism p-8 rounded-[2.5rem] mb-12">
      <input name="title" required placeholder="Nombre del Equipo" class="w-full mb-6 p-5 rounded-2xl bg-black/30 border-none font-bold text-lg outline-none placeholder:text-slate-400 text-white">
      <div class="grid grid-cols-2 gap-4">
        <input name="procesador" placeholder="CPU" class="p-4 rounded-2xl bg-black/30 border-none outline-none font-semibold text-sm placeholder:text-slate-400 text-white">
        <input name="ram" placeholder="RAM" class="p-4 rounded-2xl bg-black/30 border-none outline-none font-semibold text-sm placeholder:text-slate-400 text-white">
        <input name="almacenamiento" placeholder="Disco" class="p-4 rounded-2xl bg-black/30 border-none outline-none font-semibold text-sm placeholder:text-slate-400 text-white">
        <input name="grafica" placeholder="GPU" class="p-4 rounded-2xl bg-black/30 border-none outline-none font-semibold text-sm placeholder:text-slate-400 text-white">
      </div>
      <textarea name="nota" placeholder="Observaciones..." class="w-full mt-4 p-5 rounded-2xl bg-black/30 border-none outline-none h-28 font-semibold text-sm placeholder:text-slate-400 text-white"></textarea>
      <button type="submit" class="w-full mt-8 bg-blue-600/80 text-white py-5 rounded-2xl font-extrabold text-lg hover:bg-blue-600 transition-all shadow-xl backdrop-blur-sm">Registrar Equipo</button>
    </form>

    <div id="posts-container" class="grid gap-6"></div>
  </main>
</body>
</html>
